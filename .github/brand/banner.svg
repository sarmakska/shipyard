  <text x="212" y="205" font-family="'Geist','Segoe UI',system-ui,sans-serif" font-size="26" fill="#c4cdda">Multi-tenant SaaS spine: orgs, RBAC, billing, audit, rate limiting.</text>
  <text x="212" y="250" font-family="'Geist Mono', ui-monospace, monospace" font-size="18" fill="#6b7a90">sarmalinux.com  /  github.com/sarmakska</text>
