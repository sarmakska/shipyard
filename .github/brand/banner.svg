    <tspan fill="#34d399" font-weight="600">visitor</tspan><tspan fill="#8b9bb4">@</tspan><tspan fill="#22d3ee" font-weight="600">sarmalinux</tspan><tspan fill="#8b9bb4">:</tspan><tspan fill="#60a5fa">~</tspan><tspan fill="#8b9bb4">$ </tspan><tspan fill="#f5f7fa">shipyard</tspan>
