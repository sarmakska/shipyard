    <path d="M 30 25 L 70 25 L 70 35 L 42 35 L 42 42 L 65 42 C 78 42 78 58 65 58 L 42 58 L 42 65 L 70 65 L 70 75 L 30 75 L 30 65 L 58 65 L 58 58 L 35 58 C 22 58 22 42 35 42 L 58 42 L 58 35 L 30 35 Z" fill="#38bdf8"/>
  </g>
